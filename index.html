<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physio Exercise Management</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="app-header">
    <span class="app-title">Physio Exercise Management</span>
    <nav class="week-nav">
      <button id="btn-prev-week">&#8592; Week</button>
      <span class="week-label" id="week-label"></span>
      <button id="btn-next-week">Week &#8594;</button>
      <button id="btn-today" class="today-btn">TODAY</button>
    </nav>
  </header>

  <main class="main-wrap">
    <div class="grid-table" id="app"></div>
  </main>

  <!-- Exercise edit / add modal -->
  <div class="modal-overlay hidden" id="exercise-modal">
    <div class="modal">
      <h2 id="modal-title">Edit Exercise</h2>

      <div class="form-row full">
        <div class="form-field">
          <label for="field-name">Exercise name</label>
          <input type="text" id="field-name" placeholder="e.g. Wrist flexion" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label for="field-sets">Sets</label>
          <input type="number" id="field-sets" min="1" max="20" />
        </div>
        <div class="form-field">
          <label for="field-reps">Reps</label>
          <input type="text" id="field-reps" placeholder="e.g. 10 or 10–15" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label for="field-resistance">Resistance</label>
          <input type="text" id="field-resistance" placeholder="e.g. 5 lbs, band, elastic" />
        </div>
        <div class="form-field">
          <label for="field-frequency">Frequency</label>
          <input type="text" id="field-frequency" placeholder="e.g. 3x/week, daily" />
        </div>
      </div>

      <div class="form-row full">
        <div class="form-field">
          <label for="field-group">Group</label>
          <select id="field-group">
            <option value="arm-day1">Arm Day 1</option>
            <option value="arm-day2">Arm Day 2</option>
            <option value="legs">Legs</option>
          </select>
        </div>
      </div>

      <div class="form-row full">
        <div class="form-field">
          <label for="field-instructions">Instructions (optional)</label>
          <textarea id="field-instructions" placeholder="Step-by-step instructions…"></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-danger" id="delete-btn" style="display:none">Delete exercise</button>
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for image uploads -->
  <input type="file" id="image-upload-input" accept="image/*" />

  <!-- Scripts — order matters: data → storage → app -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
