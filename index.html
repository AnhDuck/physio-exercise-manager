<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physio Exercise Management</title>
  <link rel="icon" type="image/svg+xml" href="assets/physio-icon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="app-header">
    <span class="app-title">
      <img class="app-title-icon" src="assets/physio-icon.svg" alt="" aria-hidden="true" />
      <span>Physio Exercise Management</span>
    </span>
    <nav class="week-nav">
      <button id="btn-prev-week">&#8592; Week</button>
      <span class="week-label" id="week-label"></span>
      <button id="btn-next-week">Week &#8594;</button>
      <button id="btn-today" class="today-btn">TODAY</button>
      <button id="btn-notes" class="btn-notes" title="Toggle notes panel">Notes</button>
    </nav>
    <div class="header-actions">
      <button id="btn-settings" class="btn-settings" title="Settings">Settings</button>
    </div>
  </header>

  <main class="main-wrap">
    <aside class="notes-panel" id="notes-panel">
      <div class="notes-panel-header">
        <div>
          <h2>Notes</h2>
          <div class="notes-panel-subtitle">Timeline and regimen changes</div>
        </div>
        <button type="button" class="btn-icon panel-close-btn" id="notes-panel-close" title="Close notes">x</button>
      </div>

      <div class="note-composer">
        <div class="form-row">
          <div class="form-field">
            <label for="quick-note-date">Date</label>
            <input type="date" id="quick-note-date" />
          </div>
          <div class="form-field">
            <label for="quick-note-time">Time</label>
            <input type="time" id="quick-note-time" />
          </div>
        </div>

        <div class="form-row full">
          <div class="form-field">
            <label for="quick-note-exercise">Exercise tag</label>
            <select id="quick-note-exercise"></select>
          </div>
        </div>

        <div class="form-row full">
          <div class="form-field">
            <label for="quick-note-text">Note</label>
            <textarea id="quick-note-text" placeholder="Write what happened. Date and time are saved automatically."></textarea>
          </div>
        </div>

        <button type="button" class="btn-primary note-save-btn" id="quick-note-save">Add note</button>
      </div>

      <div class="timeline-list" id="timeline-list"></div>
    </aside>

    <div class="grid-table" id="app"></div>
  </main>

  <!-- Exercise edit / add modal -->
  <div class="modal-overlay hidden" id="exercise-modal">
    <div class="modal">
      <h2 id="modal-title">Edit Exercise</h2>

      <div class="form-row full">
        <div class="form-field">
          <label for="field-name">Exercise name</label>
          <input type="text" id="field-name" placeholder="e.g. Wrist flexion" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label for="field-sets">Sets</label>
          <input type="number" id="field-sets" min="1" max="20" />
        </div>
        <div class="form-field">
          <label for="field-reps">Reps</label>
          <input type="text" id="field-reps" placeholder="e.g. 10 or 10-15" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label for="field-resistance">Resistance</label>
          <input type="text" id="field-resistance" placeholder="e.g. 5 lbs, band, elastic" />
        </div>
        <div class="form-field">
          <label for="field-frequency">Frequency</label>
          <input type="text" id="field-frequency" placeholder="e.g. 3x/week, daily" />
        </div>
      </div>

      <div class="form-row full">
        <div class="form-field">
          <label for="field-group">Group</label>
          <select id="field-group">
            <option value="arm-day1">Arm Day 1</option>
            <option value="arm-day2">Arm Day 2</option>
            <option value="legs">Legs</option>
          </select>
        </div>
      </div>

      <div class="form-row full">
        <div class="form-field">
          <label for="field-instructions">Instructions (optional)</label>
          <textarea id="field-instructions" placeholder="Step-by-step instructions..."></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-danger" id="delete-btn" style="display:none">Delete exercise</button>
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay hidden" id="settings-modal">
    <div class="modal">
      <h2>Settings</h2>

      <div class="form-row full">
        <div class="form-field">
          <label for="setting-personal-day-start">Personal day starts at</label>
          <input type="time" id="setting-personal-day-start" />
        </div>
      </div>

      <div class="form-row full">
        <div class="form-field">
          <label>Legs days</label>
          <div class="day-check-row">
            <label class="day-check-label"><span>Mon</span><input type="checkbox" data-dow="1" /></label>
            <label class="day-check-label"><span>Tue</span><input type="checkbox" data-dow="2" /></label>
            <label class="day-check-label"><span>Wed</span><input type="checkbox" data-dow="3" /></label>
            <label class="day-check-label"><span>Thu</span><input type="checkbox" data-dow="4" /></label>
            <label class="day-check-label"><span>Fri</span><input type="checkbox" data-dow="5" /></label>
            <label class="day-check-label"><span>Sat</span><input type="checkbox" data-dow="6" /></label>
            <label class="day-check-label"><span>Sun</span><input type="checkbox" data-dow="0" /></label>
          </div>
        </div>
      </div>

      <div class="form-row full">
        <div class="form-field">
          <label>Set tracker cues</label>
          <div class="cue-check-row">
            <label class="cue-check-label"><input type="checkbox" id="setting-cue-sound" /><span>Sound</span></label>
            <label class="cue-check-label"><input type="checkbox" id="setting-cue-vibrate" /><span>Vibrate</span></label>
            <label class="cue-check-label"><input type="checkbox" id="setting-cue-speech" /><span>Speech</span></label>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" id="settings-cancel">Cancel</button>
        <button class="btn-primary" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Timeline event edit modal -->
  <div class="modal-overlay hidden" id="event-modal">
    <div class="modal event-modal">
      <h2 id="event-modal-title">Edit timeline item</h2>

      <div class="form-row">
        <div class="form-field">
          <label for="event-field-date">Date</label>
          <input type="date" id="event-field-date" />
        </div>
        <div class="form-field">
          <label for="event-field-time">Time</label>
          <input type="time" id="event-field-time" />
        </div>
      </div>

      <div class="form-row full">
        <div class="form-field">
          <label for="event-field-exercise">Exercise tag</label>
          <select id="event-field-exercise"></select>
        </div>
      </div>

      <div class="form-row full">
        <div class="form-field">
          <label for="event-field-text">Note</label>
          <textarea id="event-field-text"></textarea>
        </div>
      </div>

      <div class="event-dose-fields hidden" id="event-dose-fields"></div>
      <div class="event-detail" id="event-detail"></div>

      <div class="modal-actions">
        <button class="btn-danger" id="event-delete-btn">Delete</button>
        <button class="btn-secondary" id="event-cancel">Cancel</button>
        <button class="btn-primary" id="event-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Exercise image source modal -->
  <div class="modal-overlay hidden" id="image-modal">
    <div class="modal">
      <h2>Exercise Image</h2>

      <div class="form-row full">
        <div class="form-field">
          <label for="field-image-url">Paste image or page URL</label>
          <input
            type="url"
            id="field-image-url"
            placeholder="https://example.com/image.jpg or a page URL"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="form-help">
            The app will try the direct image first, then common page previews like og:image.
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-danger" id="image-remove-btn" style="display:none">Remove image</button>
        <button class="btn-secondary" id="image-file-btn">Choose File</button>
        <button class="btn-secondary" id="image-cancel">Cancel</button>
        <button class="btn-primary" id="image-import-btn">Import URL</button>
      </div>
    </div>
  </div>

  <input type="file" id="image-upload-input" accept="image/*" />
  <div id="set-tracker-root"></div>

  <!-- Scripts - order matters: data -> storage -> app -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
